  p.push(norm( m[3] - m[0], m[7] - m[4], m[11] - m[8], m[15] - m[12] )); 
  // Bottom 
  p.push(norm( m[3] + m[1], m[7] + m[5], m[11] + m[9], m[15] + m[13] )); 
  // Top 
  p.push(norm( m[3] - m[1], m[7] - m[5], m[11] - m[9], m[15] - m[13] )); 
  // Near 
  p.push(norm( m[3] + m[2], m[7] + m[6], m[11] + m[10], m[15] + m[14] )); 
  // Far 
  p.push(norm( m[3] - m[2], m[7] - m[6], m[11] - m[10], m[15] - m[14] )); 
  return p; 
}
function isChunkVisible(planes, cx, cy, cz) {
  const s = CHUNK_SIZE;
  const hs = s * 0.4825;

  // AABB center
  const cxw = cx * s + hs;
  const cyw = cy * s + hs;
  const czw = cz * s + hs;

  for (let i = 0; i < 6; i++) {
    const p = planes[i];

    // Distance from center to plane
    const dist =
      p.a * cxw +
      p.b * cyw +
      p.c * czw +
      p.d;

    // Projected half-extent onto plane normal
    const r =
      Math.abs(p.a) * hs +
      Math.abs(p.b) * hs +
      Math.abs(p.c) * hs;

    if (dist + r < 0) {
      return false;
    }
  }

  return true;
}
// ===== Render Loop =====
function initializeRenderer(){
  gl.disable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.enable(gl.CULL_FACE);       // Enable face culling
  gl.cullFace(gl.BACK);          // Cull back-facing triangles
  gl.frontFace(gl.CCW);          // Define counter-clockwise vertices as "front" (default)
  gl.depthFunc(gl.LEQUAL);       // Set depth function to less than or equal
  camera.initialize();
  keyHandler.initialize();
}
initializeRenderer()
let running = true;
let frameId = null;
const fov = Math.PI/3;
const near = 0.01;
let storageQuota =0;
let storage = 0;
if (navigator.storage && navigator.storage.estimate) {
  navigator.storage.estimate().then(estimate => {
    storage = (estimate.usage / 1024 / 1024).toFixed(2);
    storageQuota = (estimate.quota / 1024 / 1024).toFixed(2);
  });
}
let prevChunkX = camera.transform.position[0]/CHUNK_SIZE;
let prevChunkZ = camera.transform.position[2]/CHUNK_SIZE; 
let drawn = 0;
let transparentDrawn = 0;
const transparentModelsToDraw = new Array(Math.ceil((camera.renderDist+1)*(camera.renderDist+1)*Math.PI)*(CHUNK_HEIGHT/CHUNK_SIZE));
let transparentModelIndex = 0;
function render(time){

  if(keyHandler.keys["KeyJ"] && !debugPressed) {
    debugMode = !debugMode
    debugPressed = true
  } else {
    if(!keyHandler.keys["KeyJ"]){
      debugPressed = false;
    }
  };
  const camChunkX = Math.floor(camera.transform.position[0]/CHUNK_SIZE);
  const camChunkZ = Math.floor(camera.transform.position[2]/CHUNK_SIZE);
  const camChunkLayer = Math.floor(camera.transform.position[1]/CHUNK_SIZE)
  const camChunkMesh = chunkCache.get(camChunkX, camChunkZ)?.model?.mesh;
  const aspect = canvasWidth/canvasHeight;
  if(camChunkX !== prevChunkX || camChunkZ!== prevChunkZ){
    updateVisibleChunks(camChunkX, camChunkZ, camera.renderDist);
  }
  prevChunkX = camChunkX;
  prevChunkZ = camChunkZ;
  
  const far = (camera.renderDist+2)*CHUNK_SIZE;
  debug.debug_update(time, {
    camX: camera.transform.position[0].toFixed(2),
    camY: camera.transform.position[1].toFixed(2),
    camZ: camera.transform.position[2].toFixed(2),
    camYaw: camera.yaw.toFixed(2),
    camPitch: camera.pitch.toFixed(2),
    renderDist: camera.renderDist,
    camChunkX: camChunkX,
    camChunkZ: camChunkZ,
    camChunkLayer: camChunkLayer,
    //total: ((chunkCache.get(camChunkX, camChunkZ)?.models?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0) + (chunkCache.get(camChunkX, camChunkZ)?.transparentModels?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0))/6,
    //chunkFaces: (chunkCache.get(camChunkX, camChunkZ)?.models?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0)/6,
    //transparentChunkFaces: (chunkCache.get(camChunkX, camChunkZ)?.transparentModels?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0)/6,
    usedSlots: camChunkMesh?.slotLength,
    //slots: camChunkMesh?.slots,
    currentChunkState: "\n"+utils.objectToKeyValueString(chunkCache.get(camChunkX, camChunkZ)?.state || {}),
    chunks: chunksToRender.length,
    meshes: chunksToRender.length*CHUNK_HEIGHT / CHUNK_SIZE,
    slotsDrawn: drawn,
    transparentSlotsDrawn: transparentDrawn,
    chunksQueued: workerManager.queuedChunks.size,
    chunksCached: chunkCache.size(),
    chunksGenerated: chunksGenerated,
    chunksMeshed: chunksMeshed,
    queues: workerManager.centralWorkerPool?.describeQueues(),
    models: models.length,
    uiElements: uiElements.length,
    Used: storage+" MB",
    Quota: storageQuota+" MB",
    threadCapacity,
    workers: workerManager.centralWorkerPool?.workers.length,
    pressingKeys: Object.keys(keyHandler.keys).filter(k => keyHandler.keys[k]).map(val=> "\n"+val),
  });

  camera.update(debug.deltaTime);

  gl.clearColor(0.1, 0.1, 0.15, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  const projection = Mat4.perspective(fov, aspect, near, far);
  const view = camera.getViewMatrix();
  const orthoMatrix = Mat4.ortho(
    0, canvas.width,        // left, right
    canvas.height, 0,       // bottom, top  (flip Y for screen coords)
    -1, 1                   // near, far
  );

  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, textures[0]);

  gl.enable(gl.DEPTH_TEST);
  gl.depthMask(true);
  gl.disable(gl.BLEND);

  //models.forEach(model => model.draw());
  const m = Mat4.multiply(projection, view)
  const frustumPlanes = extractPlanes(m);
  drawn = 0;
  transparentDrawn = 0
  transparentModelIndex = 0;
  const layers = CHUNK_HEIGHT / CHUNK_SIZE;

  gl.uniformMatrix4fv(uPV, false, m);
  
  for (let c = 0; c < chunksToRender.length; c++) {
    const { cx, cz } = chunksToRender[c];
    let lowestLayer = 0;
    let highestLayer = 0;
    let visible = false;
    for (let i = 0; i < layers; i++) {
      if (isChunkVisible(frustumPlanes, cx, i, cz)) {
        lowestLayer = i;
        highestLayer = i
        visible = true;
        break;
      }
    }
    if(!visible){
      continue;
    }else{
      for(let i = layers-1; i>lowestLayer; i--){
        if (isChunkVisible(frustumPlanes, cx, i, cz)) {
          highestLayer = i;
          break;
        }
      }
    }
    const chunk = chunkCache.get(cx, cz);
    if (!chunk) continue;
    const model = chunk.model;
    const tModel = chunk.transparentModel;
    if (model?.mesh) {
      drawn+=model.draw(uModel, lowestLayer, highestLayer);
    }
    if (tModel?.mesh) {
      transparentModelsToDraw[transparentModelIndex++] = {tModel, lowestLayer, highestLayer, cx: chunk.cx, cz: chunk.cz};
    }
  }

  gl.useProgram(rawProg);

  gl.enable(gl.BLEND);
  gl.enable(gl.DEPTH_TEST);
  gl.depthMask(false);

  gl.uniformMatrix4fv(rawPV, false, m);

  for(let i = transparentModelIndex-1; i>=0; i--){
    const {tModel, lowestLayer, highestLayer, cx, cz} = transparentModelsToDraw[i];
    const d = tModel.draw(rawModel, lowestLayer, highestLayer);
    drawn+=d;
    transparentDrawn+=d;
  }

  gl.disable(gl.DEPTH_TEST);
  gl.depthMask(false);
  gl.enable(gl.BLEND);

  gl.useProgram(compressedProg);
  gl.uniformMatrix4fv(compressedPV, false, orthoMatrix);
  uiElements.forEach(model => model.draw(compressedModel));

  gl.useProgram(textProg);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, textures[1]);
  gl.uniformMatrix4fv(textProj, false, orthoMatrix
  );
  
  gl.uniform4f(textColor, 1.0, 0.0, 0.0, 1.0);

  textRenderer.begin();
  if(debugMode){
    textRenderer.addText(debug.text, 10, 10, 2.5);
  }
  textRenderer.draw_text();

  if(running){
    frameId = requestAnimationFrame(render);
  }
}

document.getElementById("pauseBtn").addEventListener("click", () => {
  if (running) {
    pauseLoop()
  } else {
    resumeLoop();
  }
});
function resumeLoop(){
  running = true;
  animationId = requestAnimationFrame(render);
  document.getElementById("pauseBtn").innerText = "Pause";
}
function pauseLoop(){
  running = false;
  cancelAnimationFrame(frameId);
  document.getElementById("pauseBtn").innerText = "Resume";
}

render();
</script>
