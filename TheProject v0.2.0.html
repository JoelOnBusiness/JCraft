const workerManager = {
  workers: Math.min(10, Math.max(threadCapacity-1, 1)),
  queuedChunks: new Set(),
  createWorker(seed) {
    // Convert dependent class definitions to strings
    const classDefs = [
      Chunk,
      Perlin2D,
      Perlin3D,
      fbmNoise2D,
      fbmNoise3D,
      CaveCarver,
      BiomeSpline,
      ChunkSampler,
      WorkerScript
    ].map(fn => fn.toString()).join('\n\n');
    const converterCode = utils.stringifyObjectWithFunctions("converter", converter);
    const meshUtilsCode = utils.stringifyObjectWithFunctions("meshUtils", meshUtils);
    // Inline worker code
    const workerCode = `
      const CHUNK_SIZE = ${CHUNK_SIZE};
      const CHUNK_HEIGHT = ${CHUNK_HEIGHT};
      const utils = {
        ${utils.clamp.toString()}
      };
      const BLOCK_META_LAYOUTS = ${JSON.stringify(BLOCK_META_LAYOUTS)};
      ${utils.stringifyObjectWithFunctions("blockStates", blockStates)}
      ${converterCode}
      ${classDefs}
      ${meshUtilsCode}
      ${utils.stringifyObjectWithFunctions("blockModels", blockModels)}
      const textureAtlasInfo = ${JSON.stringify(textureAtlasInfo)};
      blockStates.processBlockList();
      blockModels.resolveAllModels();
      const script = new WorkerScript(${seed});
      self.postMessage({ type: 0 });
      self.onmessage = (e) => {
        script.onmessage(e);
      }
     `

    // Create worker from blob
    const blob = new Blob([workerCode], { type: "application/javascript" });
    return new Worker(URL.createObjectURL(blob));
  },
  centralWorkerPool: null,
  initialize() {
    const pool = new WorkerPool(this.createWorker, this.workers, 9 + Math.floor(this.workers/2))
    pool.addQueue("CG", {
      priority: 5,
      complexity: 9.25 - this.workers*0.125,
      priorityScale: len => {
        if (len < 20) return 3;   // deprioritize
        return 5;   // ramp up when backlog grows
      }
    });
    pool.addQueue("CM", (() => {
      let high = false;
      return {
        priority: 3,
        complexity: 3.125 - this.workers*0.0625,
        priorityScale(len) {
          if (len >= 12+(4*workerManager.workers)) high = true;
          else if (len < 2) high = false;
          return high ? 8 : 2;
        }
      };
    })());
    pool.initialize();
    this.centralWorkerPool = pool;
  },
  requestChunkGeneration: async function (cx, cz){
    const c = chunkPool.get(cx, cz);
    if(!c){
      console.warn("Failed to get chunk for generation at "+cx+", "+cz);
      console.log("Pool status: ", chunkPool, "Cache status: ", chunkCache);
    }
    c.resetData(cx, cz);
    const data = {
      cx: cx,
      cz: cz,
      blocks: c.blocks,
      chunk: c,
      biomeData: { // match the worker code
        contData: biome.contSpline.arr.slice(),
        pvData: biome.pvSpline.arr.slice(),
        squashingFactor: biome.squashingFactor,
        offset: biome.offset
      },
      samplerData: { seed: SEED } // pass only data needed to rebuild
    }
    try{
    const result = await this.centralWorkerPool.runTask("CG", data, [data.blocks.buffer]);
    if(result.error){
      utils.log("Chunk worker error: "+result.error);
    }else{
      c.blocks = result.blocks;
      c.state.generated = true;
      chunkCache.set(cx, cz, c);
      this.queuedChunks.delete(utils.chunkKey(cx, cz));
      chunksGenerated++;
      this.tryQueueForMeshing(cx, cz, c);
    }
    }catch (err){
      return;
    }
  },
  requestChunkMeshing: async function (chunk, layer) {
    const state = chunk.state;
    const cx = chunk.cx;
    const cz = chunk.cz;

    try {
      // --- chunk data ---
      const blocks = chunk.getLayer(layer);
      if (
        !chunk.model?.mesh?.doesLayerHaveMesh(layer) &&
        !chunk.transparentModel?.mesh?.doesLayerHaveMesh(layer)
      ) {
        if (utils.isLayerEmpty(blocks)) {
          chunkVolumeArrays.release(blocks);
          state.meshed[layer] = true;
          state.queuedForMesh[layer] = false;
          return;
        }
      }
      // --- neighbors ---
      const nbs = Array(4);
      utils.getNeighborChunks(nbs, cx, cz);
      const east  = nbs[2];
      const west  = nbs[3];
      const north = nbs[0];
      const south = nbs[1];

      // --- slices (no spreads, no temp objects) ---
      const slices = {}
      const slcs = new Array(4);
      utils.getNeighborSlices(slcs, east, west, north, south, layer);
      slices.east = slcs[0];
      slices.west = slcs[1];
      slices.north  = slcs[2];
      slices.south  = slcs[3];
      slices.up   = chunk.getYSlice(0, layer + 1);
      slices.down = chunk.getYSlice(CHUNK_SIZE - 1, layer - 1);

      // --- transfer list (manual, fixed order) ---
      const transfer = [
        blocks.buffer,
        slices.east.buffer,
        slices.west.buffer,
        slices.north.buffer,
        slices.south.buffer,
        slices.up.buffer,
        slices.down.buffer
      ];

      const result = await this.centralWorkerPool.runTask(
        "CM",
        { blocks, slices, cx, cz, layer },
        transfer
      );

      // --- error path ---
      if (result.error) {
        // Avoid in hot path unless debugging
        console.error("Chunk mesher error:", result.stack);
        return;
      }

      // --- release slices (manual, no Object.keys) ---
      let s;

      s = result.slices.east;  chunkAreaArrays.release(s); result.slices.east  = null;
      s = result.slices.west;  chunkAreaArrays.release(s); result.slices.west  = null;
      s = result.slices.north; chunkAreaArrays.release(s); result.slices.north = null;
      s = result.slices.south; chunkAreaArrays.release(s); result.slices.south = null;
      s = result.slices.up;    chunkAreaArrays.release(s); result.slices.up    = null;
      s = result.slices.down;  chunkAreaArrays.release(s); result.slices.down  = null;

      // --- release blocks ---
      chunkVolumeArrays.release(result.blocks);
      result.blocks = null;

      // --- mesh creation ---
      chunk.createMesh(result, layer);

      // --- state updates ---
      state.meshed[layer] = true;
      state.queuedForMesh[layer] = false;
      chunksMeshed++;

    } catch (err) {
      if (err === "Task cancelled") {
        state.meshed[layer] = false;
        state.queuedForMesh[layer] = false;
        return;
      }
      console.error("Meshing error:", err);
    }
  }, 
  tryQueueForMeshing(cx,cz, cchunk = null){
    const toCheck = [
      [cx, cz],
      [cx + 1, cz], [cx - 1, cz],
      [cx, cz + 1], [cx, cz - 1]
    ];
    for (const [x, z] of toCheck) {
      const chunk = chunkCache.simpleGet(x,z);
      //utils.log(" --- checking: "+x+", "+z);
      if (
        chunk &&
        chunk.state.generated
      ) {
        if(utils.neighborsGenerated(x, z)){
          for(let i = 0; i<CHUNK_HEIGHT/CHUNK_SIZE; i++){
            if(!chunk.state.meshed[i] && !chunk.state.queuedForMesh[i]){
              chunk.state.queuedForMesh[i] = true;
              workerManager.requestChunkMeshing(chunk, i);
            }    
          }
        }
      }
    }
  }
}

function updateVisibleChunks(playerChunkX, playerChunkZ, renderRadius) {
  // Compute chunks only once
  const needed = utils.getChunksInRadius(playerChunkX, playerChunkZ, renderRadius+0.2);
  const chunksNeeded = utils.getChunksInRadius(playerChunkX, playerChunkZ, renderRadius + 1.2);

  chunksToRender = needed;

  // Build sets for fast lookup
  const neededSet = new Set(needed.map(({cx, cz}) => utils.chunkKey(cx, cz)));
  const chunksNeededSet = new Set(chunksNeeded.map(({cx, cz}) => utils.chunkKey(cx, cz)));

  // Cancel tasks outside needed radius
  const cancelledMeshes = workerManager.centralWorkerPool.cancelTasks("CM",
    data => !neededSet.has(utils.chunkKey(data.cx, data.cz))
  );

  const cancelledGen = workerManager.centralWorkerPool.cancelTasks("CG",
    data => !chunksNeededSet.has(utils.chunkKey(data.cx, data.cz))
  );

  // Remove cancelled generation tasks from queuedChunks
  for (const data of cancelledGen) {
    workerManager.queuedChunks.delete(utils.chunkKey(data.cx, data.cz));
    if(data.chunk) chunkPool.release(data.chunk);
  }

  // Process needed chunks
  for (const {cx, cz} of needed) {
    const key = utils.chunkKey(cx, cz);
    const chunk = chunkCache.get(cx, cz);

    // Queue generation if missing
    if (!chunk && !workerManager.queuedChunks.has(key)) {
      workerManager.queuedChunks.add(key);
      workerManager.requestChunkGeneration(cx, cz);
      continue;
    }

    if (!chunk || !chunk.state.generated) continue;

    // Skip if all layers already meshed
    let allMeshed = true;
    const meshedLayers = chunk.state.meshed;
    for (let i = 0; i < meshedLayers.length; i++) {
      if (!meshedLayers[i]) {
        allMeshed = false;
        break;
      }
    }
    if (allMeshed) continue;

    if (!utils.neighborsGenerated(cx, cz)) continue;

    // Queue missing layers for meshing
    for (let layer = 0; layer < meshedLayers.length; layer++) {
      if (!meshedLayers[layer] && !chunk.state.queuedForMesh[layer]) {
        chunk.state.queuedForMesh[layer] = true;
        workerManager.requestChunkMeshing(chunk, layer);
      }
    }
  }

  // Sort generation queue by distance to player
  workerManager.centralWorkerPool.sortQueue("CG", (a, b) => {
    const da = utils.dist(a.data.cx, a.data.cz, playerChunkX, playerChunkZ);
    const db = utils.dist(b.data.cx, b.data.cz, playerChunkX, playerChunkZ);
    return da - db;
  });

  return;
}
function extractPlanes(m) { 
  const p = []; 
  
  function norm(a,b,c,d) { 
    const l = Math.hypot(a,b,c); 
    return { a:a/l, b:b/l, c:c/l, d:d/l }; } 
    // Left 
  p.push(norm( m[3] + m[0], m[7] + m[4], m[11] + m[8], m[15] + m[12] )); 
  // Right 
  p.push(norm( m[3] - m[0], m[7] - m[4], m[11] - m[8], m[15] - m[12] )); 
  // Bottom 
  p.push(norm( m[3] + m[1], m[7] + m[5], m[11] + m[9], m[15] + m[13] )); 
  // Top 
  p.push(norm( m[3] - m[1], m[7] - m[5], m[11] - m[9], m[15] - m[13] )); 
  // Near 
  p.push(norm( m[3] + m[2], m[7] + m[6], m[11] + m[10], m[15] + m[14] )); 
  // Far 
  p.push(norm( m[3] - m[2], m[7] - m[6], m[11] - m[10], m[15] - m[14] )); 
  return p; 
}
function isChunkVisible(planes, cx, cy, cz) {
  const s = CHUNK_SIZE;
  const hs = s * 0.4825;

  // AABB center
  const cxw = cx * s + hs;
  const cyw = cy * s + hs;
  const czw = cz * s + hs;

  for (let i = 0; i < 6; i++) {
    const p = planes[i];

    // Distance from center to plane
    const dist =
      p.a * cxw +
      p.b * cyw +
      p.c * czw +
      p.d;

    // Projected half-extent onto plane normal
    const r =
      Math.abs(p.a) * hs +
      Math.abs(p.b) * hs +
      Math.abs(p.c) * hs;

    if (dist + r < 0) {
      return false;
    }
  }

  return true;
}
// ===== Render Loop =====
let running = true;
let frameId = null;
const fov = Math.PI/3;
const near = 0.01;
let storageQuota =0;
let storage = 0;
if (navigator.storage && navigator.storage.estimate) {
  navigator.storage.estimate().then(estimate => {
    storage = (estimate.usage / 1024 / 1024).toFixed(2);
    storageQuota = (estimate.quota / 1024 / 1024).toFixed(2);
  });
}
let prevChunkX = Math.floor(camera.getPosition()[0]/CHUNK_SIZE);
let prevChunkZ = Math.floor(camera.getPosition()[2]/CHUNK_SIZE); 
let drawn = 0;
let transparentDrawn = 0;
const transparentModelsToDraw = new Array(Math.ceil((camera.renderDist+1)*(camera.renderDist+1)*Math.PI)*(CHUNK_HEIGHT/CHUNK_SIZE));
let transparentModelIndex = 0;
const textColor = new Float32Array([1.0, 0.0, 0.0, 1.0]);
function render(time){
  gameClock.tick(time);

  player.update(gameClock.deltaTime);

  const camPos = camera.getPosition();
  const camChunkX = Math.floor(camPos[0]/CHUNK_SIZE);
  const camChunkZ = Math.floor(camPos[2]/CHUNK_SIZE);
  const camChunkLayer = Math.floor(camPos[1]/CHUNK_SIZE)
  const currentChunk = chunkCache.simpleGet(camChunkX, camChunkZ);
  const aspect = canvasWidth/canvasHeight;
  if(camChunkX !== prevChunkX || camChunkZ!== prevChunkZ){
    updateVisibleChunks(camChunkX, camChunkZ, camera.renderDist);
  }
  prevChunkX = camChunkX;
  prevChunkZ = camChunkZ;
  const far = (camera.renderDist*1.5)*CHUNK_SIZE;
  const projection = Mat4.perspective(fov, aspect, near, far);
  const view = camera.getViewMatrix();
  const orthoMatrix = Mat4.ortho(
    0, canvas.width,        // left, right
    canvas.height, 0,       // bottom, top  (flip Y for screen coords)
    -1, 1                   // near, far
  );
  const m = Mat4.multiply(projection, view)
  const frustumPlanes = extractPlanes(m);
  const layers = CHUNK_HEIGHT / CHUNK_SIZE;
  drawn = 0;
  transparentDrawn = 0
  transparentModelIndex = 0;

  const commandEncoder = device.createCommandEncoder();
  const passEncoder = commandEncoder.beginRenderPass({
    colorAttachments: [{
      view: context.getCurrentTexture().createView(),
      loadOp: "clear",
      storeOp: "store",
      clearValue: { r: 0.1, g: 0.1, b: 0.15, a: 1 }
    }],
    depthStencilAttachment: {
      view: depthView,
      depthLoadOp: "clear",
      depthStoreOp: "store",
      depthClearValue: 1.0,
    }
  });
  passEncoder.setPipeline(opaqueShader.pipeline);
  passEncoder.setBindGroup(0, opaqueShader.globalBindGroup);
  device.queue.writeBuffer(opaqueShader.uPVUniformBuffer, 0, m);
  
  for (let c = 0; c < chunksToRender.length; c++) {
    const { cx, cz } = chunksToRender[c];
    let lowestLayer = 0;
    let highestLayer = 0;
    let visible = false;
    for (let i = 0; i < layers; i++) {
      if (isChunkVisible(frustumPlanes, cx, i, cz)) {
        lowestLayer = i;
        highestLayer = i
        visible = true;
        break;
      }
    }
    if(!visible){
      continue;
    }else{
      for(let i = layers-1; i>lowestLayer; i--){
        if (isChunkVisible(frustumPlanes, cx, i, cz)) {
          highestLayer = i;
          break;
        }
      }
    }
    const chunk = chunkCache.simpleGet(cx, cz);
    if(!chunk){
      continue;
    }
    const model = chunk.model;
    const tModel = chunk.transparentModel;
    if (model?.mesh) {
      drawn+=model.draw(passEncoder, lowestLayer, highestLayer);
    }
    if (tModel?.mesh) {
      transparentModelsToDraw[transparentModelIndex++] = {tModel, lowestLayer, highestLayer};
    }
  }

  passEncoder.setPipeline(transparentShader.pipeline);
  passEncoder.setBindGroup(0, transparentShader.globalBindGroup);
  device.queue.writeBuffer(transparentShader.uPVUniformBuffer, 0, m);

  for(let i = transparentModelIndex-1; i>=0; i--){
    const {tModel, lowestLayer, highestLayer} = transparentModelsToDraw[i];
    const d = tModel.draw(passEncoder, lowestLayer, highestLayer);
    drawn+=d;
    transparentDrawn+=d;
  }

  if(debug.debugMode){

  }

  passEncoder.setPipeline(compressedUIShader.pipeline);
  passEncoder.setBindGroup(0, compressedUIShader.globalBindGroup);
  device.queue.writeBuffer(compressedUIShader.uPVUniformBuffer, 0, orthoMatrix);
  uiElements.forEach(model => model.draw(passEncoder));

  passEncoder.setPipeline(textShader.pipeline);
  passEncoder.setBindGroup(0, textShader.globalBindGroup);
  device.queue.writeBuffer(textShader.colorUniformBuffer, 0, textColor);
  textRenderer.begin();
  if(debug.debugMode){
    debug.debug_update({
      camPos: "x: " + camera.transform.position[0].toFixed(2) + ", y: " + camera.transform.position[1].toFixed(2) + ", z: " + camera.transform.position[2].toFixed(2)+ " yaw: "+camera.yaw.toFixed(2)+" pitch: "+camera.pitch.toFixed(2),
      renderDist: camera.renderDist,
      camChunkPos: "cx: " + camChunkX + ", cz: " + camChunkZ + ", layer: "+camChunkLayer,
      playerVelocity: player.velocity.map(v => v.toFixed(2)).join(", "),
      //total: ((chunkCache.get(camChunkX, camChunkZ)?.models?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0) + (chunkCache.get(camChunkX, camChunkZ)?.transparentModels?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0))/6,
      //chunkFaces: (chunkCache.get(camChunkX, camChunkZ)?.models?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0)/6,
      //transparentChunkFaces: (chunkCache.get(camChunkX, camChunkZ)?.transparentModels?.[camChunkLayer]?.mesh?.TOTAL_VERTS || 0)/6,
      usedSlots: currentChunk?.model?.mesh?.slotLength + " of " + currentChunk?.model?.mesh?.SLOT_COUNT,
      usedTransparentSlots: currentChunk?.transparentModel?.mesh?.slotLength + " of " + currentChunk?.transparentModel?.mesh?.SLOT_COUNT,
      //slots: camChunkMesh?.slots,
      currentChunkState: "\n"+utils.objectToKeyValueString(currentChunk?.state || {}),
      chunks: chunksToRender.length,
      meshes: chunksToRender.length*CHUNK_HEIGHT / CHUNK_SIZE,
      slotsDrawn: drawn + " opaque, "+transparentDrawn+" transparent, total: "+(drawn+transparentDrawn),
      chunksCached: chunkCache.size() + " in cache. " + chunkPool.size() + " in pool. " + (chunkCache.size() + chunkPool.size()) + " total.",
      chunksGenerated: chunksGenerated,
      chunksMeshed: chunksMeshed,
      queues: workerManager.centralWorkerPool?.describeQueues(),
      models: models.length,
      uiElements: uiElements.length,
      Used: storage+" MB",
      Quota: storageQuota+" MB",
      threadCapacity,
      workers: workerManager.centralWorkerPool?.workers.length,
      pressingKeys: inputManager.keys.map((val, index) => val>0 ? index : 0).filter(v => v !== 0).join(", ")
    });
    textRenderer.addText(passEncoder, debug.text, 10, 10, 2.5);
  }
  textRenderer.draw_text(passEncoder);

  // end pass
  passEncoder.end();

  // submit to GPU
  device.queue.submit([commandEncoder.finish()]);

  debug.fps_update();
  if(inputManager.isKeyPressed(74)){ // J for debug toggle
    debug.debugMode = !debug.debugMode;
  } 

  inputManager.update();

  if(running){
    frameId = requestAnimationFrame(render);
  }
}
document.getElementById("pauseBtn").addEventListener("click", () => {
  if (running) {
    pauseLoop()
  } else {
    resumeLoop();
  }
});
function resumeLoop(){
  running = true;
  animationId = requestAnimationFrame(render);
  document.getElementById("pauseBtn").innerText = "Pause";
}
function pauseLoop(){
  running = false;
  cancelAnimationFrame(frameId);
  document.getElementById("pauseBtn").innerText = "Resume";
}


</script>
